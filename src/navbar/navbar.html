<header class="navbar-shadow p-3 mb-4">
    <div class="container flex justify-content-between align-itrms-center">
        <a routerLink="/" class="navbar-logo flex gap-2 align-items-center">
            <img ngSrc="/logo-prompt-hub.png" alt="logo" height="36" width="36" />
            Prompt Hub
        </a>


        <div class="flex align-items-center gap-2"> @if (authService.currentUser(); as currentUser) {
            <p-message severity="success" size="small">{{currentUser.username}}</p-message>
        
            <p-button severity="secondary" (onClick)="logout()" label="Déconnexion" size="small" />
            } @else {
            <p-button severity="secondary" routerLink="/auth" label="Connexion" size="small" />
            }

            <p-button severity="secondary" size="small" (onClick)="isDark.update((value) => !value)"
                [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'" />
            <p-button routerLink="/prompts/create" label="Ajouter" icon="pi pi-plus" size="small"/>
        </div>
    </div>
</header>
